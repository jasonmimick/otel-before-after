# OpenTelemetry Collector — the single OTLP front door.
# after/ apps export here; everything fans out to the LGTM backend over OTLP.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  otlp/lgtm:
    endpoint: lgtm:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/lgtm]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/lgtm]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/lgtm]
