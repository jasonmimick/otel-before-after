app = "otel-ba-ecommerce-after"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  ENABLE_TRAFFIC_GEN = "true"
  OTEL_SERVICE_NAME = "ecommerce-after"
  OTEL_EXPORTER_OTLP_ENDPOINT = "http://otel-ba-collector.internal:4318"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
